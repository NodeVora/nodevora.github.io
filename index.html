<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nodevora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css?v=1.0.1">
</head>

<body>

  <!-- HEADER -->
  <div id="header">Nodevora</div>

  <!-- SIDEBAR COLLAPSE BUTTON -->
  <button id="collapseBtn">☰</button>

  <!-- SYSTEM PANEL -->
  <div id="systemPanel">
    <div class="metric"><strong>RAM:</strong> <span id="ramUsage">--%</span></div>
    <div class="metric"><strong>Net:</strong> <span id="netSpeed">-- Mbps</span></div>
    <div class="metric"><strong>Status:</strong> <span id="netStatus">Offline</span></div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="side-icon">💬</div>
    <div class="side-icon">⭐</div>
    <div class="side-icon">📁</div>
  </div>

  <!-- MAIN CHAT AREA -->
  <div id="main">
    <div id="chat"></div>
  </div>

  <!-- INPUT BAR -->
  <div id="inputBar">
    <input id="input" placeholder="Ask Nodevora…" />
    <button id="send">Send</button>
  </div>

  <!-- SCROLL-TO-BOTTOM BUTTON -->
  <div id="scrollDownBtn">↓</div>

  <!-- MAIN JS -->
  <script type="module" src="main.js"></script>

</body>
</html>
