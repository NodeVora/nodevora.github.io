<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nodevora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="style.css?v=1.0.3">
</head>

<body>

  <!-- ============================================================
       HEADER WITH CENTERED NODEVORA LOGO
  ============================================================ -->
  <header id="header">
    <button id="collapseBtn" aria-label="Toggle sidebar">☰</button>

    <div id="logoContainer">
      <div id="nodevoraLogo">NODEVORA</div>
    </div>
  </header>

  <!-- ============================================================
       SIDEBAR — CHAT MANAGER
  ============================================================ -->
  <aside id="sidebar" aria-label="Chat history">
    <button id="newChatBtn" class="side-icon">＋ New Chat</button>
    <nav id="chatList"></nav>
  </aside>

  <!-- ============================================================
       SYSTEM PANEL
  ============================================================ -->
  <section id="systemPanel" aria-label="System status">
    <div class="metric"><strong>RAM:</strong> <span id="ramUsage">--%</span></div>
    <div class="metric"><strong>Net:</strong> <span id="netSpeed">-- Mbps</span></div>
    <div class="metric"><strong>Status:</strong> <span id="netStatus">Offline</span></div>

    <div class="metric"><strong>Model:</strong> <span id="modelName">--</span></div>
    <div class="metric"><strong>GPU:</strong> <span id="gpuName">--</span></div>
    <div class="metric"><strong>LLM:</strong> <span id="llmStatus">Loading…</span></div>
  </section>

  <!-- ============================================================
       MAIN CHAT AREA
  ============================================================ -->
  <main id="main">
    <div id="chat" aria-live="polite"></div>
  </main>

  <!-- ============================================================
       INPUT BAR
  ============================================================ -->
  <footer id="inputBar">
    <input id="input" placeholder="Ask Nodevora…" aria-label="Message input" />
    <button id="send" aria-label="Send message">Send</button>
  </footer>

  <!-- ============================================================
       SCROLL-TO-BOTTOM BUTTON
  ============================================================ -->
  <button id="scrollDownBtn" aria-label="Scroll to bottom">↓</button>

  <!-- ============================================================
       MAIN JAVASCRIPT
  ============================================================ -->
  <script type="module" src="main.js"></script>

</body>
</html>
