<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nodevora Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* --- GLOBAL --- */
    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: #0b0b0f;
      color: #e2e2e7;
      overflow: hidden;
    }

    /* Cosmic gradient background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, #3a1b8f55, transparent 60%),
                  radial-gradient(circle at 80% 70%, #0fffc855, transparent 60%);
      z-index: -2;
      filter: blur(80px);
    }

    /* Soft starfield */
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.25;
    }

    /* --- TITLE --- */
    h1 {
      text-align: center;
      margin-top: 25px;
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #b06cff, #6ef7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    /* --- CHAT WINDOW --- */
    #chat {
      width: 90%;
      height: 55vh;
      margin: 20px auto;
      padding: 20px;
      border-radius: 14px;
      background: rgba(20, 20, 28, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(140, 90, 255, 0.35);
      box-shadow: 0 0 25px #000000aa;
      overflow-y: auto;
      animation: fadeIn 1.2s ease;
    }

    .msg {
      margin: 14px 0;
      padding: 12px 16px;
      border-radius: 10px;
      max-width: 75%;
      line-height: 1.5;
      white-space: pre-wrap;
      animation: fadeInUp 0.35s ease;
    }

    .you {
      margin-left: auto;
      background: linear-gradient(135deg, #6f3bff, #b06cff);
      color: white;
      box-shadow: 0 0 12px #6f3bff88;
    }

    .ai {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .system {
      text-align: center;
      opacity: 0.6;
      font-size: 0.85rem;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- INPUT AREA --- */
    .input-area {
      width: 90%;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      animation: fadeIn 1.5s ease;
    }

    #input {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(140, 90, 255, 0.4);
      background: rgba(20, 20, 28, 0.85);
      color: #e2e2e7;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    #input:focus {
      border-color: #b06cff;
      box-shadow: 0 0 12px #b06cff55;
    }

    #send {
      padding: 16px 26px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #6f3bff, #b06cff);
      color: white;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: 0.25s;
      box-shadow: 0 0 12px #6f3bff88;
    }

    #send:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 18px #b06cffaa;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>

  <canvas id="matrixCanvas"></canvas>

  <h1>Nodevora Console</h1>

  <div id="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask Nodevora anything..." />
    <button id="send">Send</button>
  </div>

  <script>
    /* --- STARFIELD (replaces Matrix rain but keeps your canvas logic) --- */
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = Array.from({ length: 200 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2,
      speed: 0.2 + Math.random() * 0.8
    }));

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";

      stars.forEach(s => {
        ctx.globalAlpha = 0.4 + Math.random() * 0.6;
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
      });
    }

    setInterval(drawStars, 33);

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

  <script type="module" src="main.js"></script>

</body>
</html>
