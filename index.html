<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nodevora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
      background: #0b0b0f;
      color: #e2e2e7;
      overflow: hidden;
      display: flex;
      height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, #3a1b8f55, transparent 60%),
                  radial-gradient(circle at 80% 70%, #0fffc855, transparent 60%);
      z-index: -2;
      filter: blur(80px);
    }

    /* COLLAPSE BUTTON */
    #collapseBtn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(20, 20, 28, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: 0.25s;
    }

    #collapseBtn:hover {
      background: rgba(40, 40, 48, 0.85);
    }

    /* SIDEBAR */
    #sidebar {
      width: 260px;
      background: rgba(15, 15, 22, 0.75);
      backdrop-filter: blur(14px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      padding: 14px;
      box-sizing: border-box;
      transition: width 0.35s ease, opacity 0.35s ease;
    }

    #sidebar.collapsed {
      width: 0;
      opacity: 0;
      overflow: hidden;
    }

    #sidebar h2 {
      margin: 0 0 12px 0;
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(90deg, #b06cff, #6ef7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #newChatBtn {
      width: 100%;
      padding: 10px;
      background: #2a2a33;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 12px;
    }

    #newChatBtn:hover {
      background: #3a3a44;
    }

    #chatList {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      padding: 10px;
      margin-bottom: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
    }

    .chat-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .chat-item.active {
      background: rgba(255, 255, 255, 0.18);
    }

    .delete-btn {
      opacity: 0.6;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 4px;
    }

    .delete-btn:hover {
      opacity: 1;
    }

    /* MAIN */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: margin-left 0.35s ease;
    }

    body.sidebar-collapsed #main {
      margin-left: 0 !important;
    }

    h1 {
      text-align: center;
      margin: 18px 0;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #b06cff, #6ef7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #chat {
      flex: 1;
      margin: 0 20px;
      padding: 20px;
      border-radius: 14px;
      background: rgba(20, 20, 28, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(140, 90, 255, 0.35);
      overflow-y: auto;
      box-shadow: 0 0 25px #000000aa;
    }

    .msg {
      margin: 14px 0;
      padding: 12px 16px;
      border-radius: 10px;
      max-width: 75%;
      line-height: 1.5;
      white-space: pre-wrap;
      animation: fadeInUp 0.35s ease;
    }

    .you {
      margin-left: auto;
      background: linear-gradient(135deg, #6f3bff, #b06cff);
      color: white;
      box-shadow: 0 0 12px #6f3bff88;
    }

    .ai {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .system {
      opacity: 0.7;
      text-align: center;
      font-size: 0.85rem;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* INPUT */
    .input-area {
      display: flex;
      padding: 14px 20px;
      gap: 12px;
      background: rgba(15, 15, 22, 0.75);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    #input {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(140, 90, 255, 0.4);
      background: rgba(20, 20, 28, 0.85);
      color: #e2e2e7;
      font-size: 1rem;
      outline: none;
    }

    #send {
      padding: 14px 22px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #6f3bff, #b06cff);
      color: white;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: 0.25s;
      box-shadow: 0 0 12px #6f3bff88;
    }

    #send:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 18px #b06cffaa;
    }

    /* SYSTEM PANEL */
    #systemPanel {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(20, 20, 28, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      z-index: 999;
      box-shadow: 0 0 18px #00000088;
      transition: top 0.35s ease;
    }

    body.sidebar-collapsed #systemPanel {
      top: 180px;
    }

    #systemPanel .metric {
      margin: 4px 0;
    }
  </style>
</head>

<body>

  <button id="collapseBtn">☰</button>

  <div id="systemPanel">
    <div class="metric"><strong>RAM:</strong> <span id="ramUsage">--%</span></div>
    <div class="metric"><strong>Net:</strong> <span id="netSpeed">-- Mbps</span></div>
    <div class="metric"><strong>Status:</strong> <span id="netStatus">Offline</span></div>
  </div>

  <div id="sidebar">
    <h2>Nodevora</h2>
    <button id="newChatBtn">+ New Chat</button>
    <div id="chatList"></div>
  </div>

  <div id="main">
    <h1>Nodevora Console</h1>
    <div id="chat"></div>

    <div class="input-area">
      <input id="input" placeholder="Ask Nodevora anything..." />
      <button id="send">Send</button>
    </div>
  </div>

  <!-- WEBLLM + CHAT + SYSTEM PANEL -->
  <script type="module">
    import { CreateWebWorkerMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const chatBox = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const sidebar = document.getElementById("sidebar");
    const collapseBtn = document.getElementById("collapseBtn");

    let engine = null;

    /* SIDEBAR COLLAPSE */
    let collapsed = localStorage.getItem("sidebarCollapsed") === "true";

    function applySidebarState() {
      if (collapsed) {
        sidebar.classList.add("collapsed");
        document.body.classList.add("sidebar-collapsed");
      } else {
        sidebar.classList.remove("collapsed");
        document.body.classList.remove("sidebar-collapsed");
      }
    }

    applySidebarState();

    collapseBtn.onclick = () => {
      collapsed = !collapsed;
      localStorage.setItem("sidebarCollapsed", collapsed);
      applySidebarState();
    };

    /* MEMORY */
    let conversationMemory = [];
    try {
      const stored = localStorage.getItem("chat_memory");
      if (stored) conversationMemory = JSON.parse(stored);
    } catch {}

    let factMemory = [];
    try {
      const storedFacts = localStorage.getItem("fact_memory");
      if (storedFacts) factMemory = JSON.parse(storedFacts);
    } catch {}

    const MAX_CONVERSATION = 20;

    function saveMemory() {
      localStorage.setItem("chat_memory", JSON.stringify(conversationMemory));
      localStorage.setItem("fact_memory", JSON.stringify(factMemory));
    }

    function addFact(text) {
      if (!factMemory.includes(text)) {
        factMemory.push(text);
        saveMemory();
      }
    }

    function getRelevantFacts(query, topK = 5) {
      const keywords = query.toLowerCase().split(/\s+/);
      const scored = factMemory.map(fact => {
        const score = keywords.reduce(
          (acc, kw) => acc + (fact.toLowerCase().includes(kw) ? 1 : 0),
          0
        );
        return { fact, score };
      });
      scored.sort((a, b) => b.score - a.score);
      return scored.filter(s => s.score > 0).slice(0, topK).map(s => s.fact);
    }

    function trimConversation() {
      if (conversationMemory.length > MAX_CONVERSATION) {
        conversationMemory = conversationMemory.slice(-MAX_CONVERSATION);
      }
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + (role === "you" ? "you" : role === "ai" ? "ai" : "system");
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function loadChat() {
      conversationMemory.forEach(m => {
        addMessage(m.role === "user" ? "you" : "ai", m.content);
      });
    }

    /* INIT LLM */
    async function initLLM() {
      addMessage("system", "Loading Qwen2.5‑1.5B‑Instruct…");

      const modelRecord = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC";
      const modelUrl = "https://huggingface.co/mlc-ai/Qwen2.5-1.5B-Instruct-q4f16_1-MLC/";

      try {
        engine = await CreateWebWorkerMLCEngine(
          new Worker("worker.js", { type: "module" }),
          modelRecord,
          {
            model_url: modelUrl,
            initProgressCallback: (report) => {
              const percent = Math.round(report.progress * 100);
              addMessage("system", `${report.text || "Loading…"} (${percent}%)`);
            }
          }
        );

        addMessage("system", "Model loaded. Ready.");
      } catch (err) {
        addMessage("system", "Model load failed: " + err.message);
      }
    }

    /* SEARCH */
    async function webSearch(query) {
      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) return "No results.";

        return data
          .map(
            (r, i) =>
              `${i + 1}. ${r.title}\n${r.url}\n${r.snippet || ""}`
          )
          .join("\n\n");
      } catch (e) {
        return "Search failed: " + e.message;
      }
    }

    /* SEND MESSAGE */
    sendBtn.onclick = async () => {
      const text = input.value.trim();
      if (!text) return;

      addMessage("you", text);
      input.value = "";

      addFact(text);

      conversationMemory.push({ role: "user", content: text });
      trimConversation();
      saveMemory();

      const relevantFacts = getRelevantFacts(text);
      const memoryPrompt = relevantFacts.length
        ? "Relevant memory:\n" + relevantFacts.join("\n")
        : "";

      let searchContext = "";

      if (text.toLowerCase().startsWith("search ")) {
        const q = text.slice(7).trim() || text;
        addMessage("system", `Searching: ${q}`);
        searchContext = await webSearch(q);
      }

      const systemParts = [];
      if (memoryPrompt) systemParts.push(memoryPrompt);
      if (searchContext) systemParts.push("Web search results:\n" + searchContext);

      const systemContent =
        systemParts.join("\n\n") || "You are a helpful assistant.";

      const messages = [
        { role: "system", content: systemContent },
        ...conversationMemory
      ];

      const reply = await engine.chat.completions.create({
        messages,
        stream: false
      });

      const aiText = reply.choices[0].message.content;

      addMessage("ai", aiText);

      conversationMemory.push({ role: "assistant", content: aiText });
      trimConversation();
      saveMemory();
    };

    loadChat();
    initLLM();

    /* SYSTEM PANEL */
    function updateRAM() {
      if (performance.memory) {
        const used = performance.memory.usedJSHeapSize;
        const total = performance.memory.jsHeapSizeLimit;
        const pct = ((used / total) * 100).toFixed(1);
        document.getElementById("ramUsage").textContent = pct + "%";
      } else {
        document.getElementById("ramUsage").textContent = "--";
      }
    }
    setInterval(updateRAM, 2000);

    function updateNetworkStatus() {
      document.getElementById("netStatus").textContent =
        navigator.onLine ? "Online" : "Offline";
    }
    window.addEventListener("online", updateNetworkStatus);
    window.addEventListener("offline", updateNetworkStatus);
    updateNetworkStatus();

    async function testNetworkSpeed() {
      const start = performance.now();
      try {
        await fetch("https://speed.cloudflare.com/__down?bytes=1000000", { cache: "no-store" });
        const duration = (performance.now() - start) / 1000;
        const mbps = (8 / duration).toFixed(1);
        document.getElementById("netSpeed").textContent = mbps + " Mbps";
      } catch {
        document.getElementById("netSpeed").textContent = "--";
      }
    }
    setInterval(testNetworkSpeed, 5000);
  </script>

</body>
</html>
