<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nodevora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <div id="header">
    <button id="collapseBtn">☰</button>
    <div id="headerTitle">Nodevora</div>
  </div>

  <!-- SIDEBAR (Chat Manager) -->
  <div id="sidebar">
    <button id="newChatBtn" class="side-icon">＋ New Chat</button>

    <div id="chatList"></div>
  </div>

  <!-- SYSTEM PANEL -->
  <div id="systemPanel">
    <div class="metric"><strong>RAM:</strong> <span id="ramUsage">--%</span></div>
    <div class="metric"><strong>Net:</strong> <span id="netSpeed">-- Mbps</span></div>
    <div class="metric"><strong>Status:</strong> <span id="netStatus">Offline</span></div>

    <div class="metric"><strong>Model:</strong> <span id="modelName">--</span></div>
    <div class="metric"><strong>GPU:</strong> <span id="gpuName">--</span></div>
    <div class="metric"><strong>LLM:</strong> <span id="llmStatus">Loading…</span></div>
  </div>

  <!-- MAIN CHAT AREA -->
  <div id="main">
    <div id="chat"></div>
  </div>

  <!-- INPUT BAR -->
  <div id="inputBar">
    <input id="input" placeholder="Ask Nodevora…" />
    <button id="send">Send</button>
  </div>

  <!-- SCROLL-TO-BOTTOM BUTTON -->
  <div id="scrollDownBtn">↓</div>

  <!-- MAIN JS -->
  <script type="module" src="main.js"></script>

</body>
</html>
